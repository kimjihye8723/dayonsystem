server {
    listen 80;
    server_name 114.108.180.228; # 또는 도메인명

    # 프론트엔드 정적 파일 경로 (npm run build 후 dist 폴더 내용물)
    root /var/www/godata/dist;
    index index.html;

    location / {
        # SPA 라우팅 대응: 파일이 없으면 index.html로 리다이렉트
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API 리버스 프록시 (Port 5000)
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
